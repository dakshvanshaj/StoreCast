  - Business Context: 
      - Report: 01_business_context.md
      - Business Metrics: 01a_business_metrics_math.md
      - Baseline Model: ./notebooks_docs/01_baseline.ipynb
  - Data Pipelines:
      - Bronze Ingestion: scripts_docs/ingest_bronze_doc.md
      - Silver Transformation: scripts_docs/clean_silver_doc.md
  - Data Architecture:
      - Tech Stack & Tradeoffs: 02_architecture_tradeoffs.md
      - Medallion Complete Diagram: 03_medallion_architecture.md
      - MLOps Infrastructure: 04_mlops_infrastructure.md
  - Data Science & ML EDA:
      - 01 Baseline Model: ./notebooks_docs/01_baseline.ipynb
      - 02 Feasibility Study: ./notebooks_docs/02_feasibility_study.ipynb
      - 03 Data Quality Profiling: ./notebooks_docs/03_data_quality_profiling.ipynb
      - 04 Time Series EDA & Ghost Gaps: ./notebooks_docs/04_time_series_analysis.ipynb
      - 05 TS Variance Stabilization & Normalization: ./notebooks_docs/05_time_series_analysis.ipynb
      - 06 TS Decomposition, ACF & PACF: ./notebooks_docs/06_time_series_analysis.ipynb
      - 07 Exogenous Sales Drivers: ./notebooks_docs/07_eda_sales_drivers.ipynb
      - 08 ML Transformations: ./notebooks_docs/08_ml_eda_and_transformations.ipynb
      - 09 TSA Feature Engineering: ./notebooks_docs/09_tsa_feature_engineering.ipynb
  - Feasibility Study:
      - Feasibility Report: feasibility_report.md
      - Baseline Feasibility Study: ./notebooks_docs/04_feasibility_study.ipynb
      

theme:
  name: material
  logo: images/logo.png
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  primary: teal
  accent: amber
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.instant

plugins:
  - search
  - mkdocs-jupyter
  - mermaid2

repo_url: https://github.com/dakshvanshaj/storecast
repo_name: StoreCast

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dakshvanshaj

    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/daksh-vanshaj-9a9650344/
