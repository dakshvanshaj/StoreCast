theme:
  name: material
  logo: images/logo.png
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  primary: teal
  accent: amber
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    # - navigation.instant

plugins:
  - search
  - mkdocs-jupyter
  - mermaid2

repo_url: https://github.com/dakshvanshaj/StoreCast
repo_name: StoreCast
docs_dir: docs
site_dir: site
extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:davevanshaj@gmail.com
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/daksh-vanshaj/

    - icon: fontawesome/brands/github
      link: https://github.com/dakshvanshaj
